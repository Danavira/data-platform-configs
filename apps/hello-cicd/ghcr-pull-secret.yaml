apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: hello-cicd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .token }}",
                "auth": "{{ list .username .token | join ":" | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: GITHUB_USERNAME
    - secretKey: token
      remoteRef:
        key: GITHUB_TOKEN
