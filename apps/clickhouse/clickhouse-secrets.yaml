apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: clickhouse-credentials
  namespace: clickhouse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore
  target:
    name: clickhouse-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: CLICKHOUSE_PASSWORD
